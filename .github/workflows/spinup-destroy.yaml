name: Configure Azure environment
on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - spin up environment
          - destroy environment
env:
  IMAGE_REGISTRY_URL: ghcr.io
  AZURE_RESOURCE_GROUP: cd-with-actions
  AZURE_LOCATION: '"East US"'
  AZURE_WEBAPP_NAME: ktdroulard-ttt-app
jobs:
  setup-up-azure-resources:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'spin up environment') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'spin up environment')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Register Container Apps provider
        run: |
          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.OperationalInsights --wait
      - name: Create Azure resource group
        if: success()
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Create Container App environment
        if: success()
        run: |
          az containerapp env create \
            --name ${{ env.AZURE_WEBAPP_NAME }}-env \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Create Container App
        if: success()
        run: |
          IMAGE_PATH=$(echo "${{ env.IMAGE_REGISTRY_URL }}/${{ github.actor }}/ttt-app:latest" | tr '[:upper:]' '[:lower:]')
          az containerapp create \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --environment ${{ env.AZURE_WEBAPP_NAME }}-env \
            --image $IMAGE_PATH \
            --registry-server ${{ env.IMAGE_REGISTRY_URL }} \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.CR_PAT }} \
            --ingress external \
            --target-port 80 \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  destroy-azure-resources:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'destroy environment') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'destroy environment')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Destroy Azure environment
        if: success()
        run: |
          az group delete \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --yes
